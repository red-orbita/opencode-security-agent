rules:
  # ─── Credential exfiltration ───────────────────────────────────────────

  - id: credential-file-read
    patterns:
      - pattern-either:
          - pattern: open("$PATH", ...)
          - pattern: Path("$PATH").read_text(...)
          - pattern: Path("$PATH").read_bytes(...)
    metavariable-regex:
      metavariable: $PATH
      regex: .*(\.aws/credentials|\.ssh/id_|\.env|\.gnupg|\.kube/config|shadow|credentials\.json).*
    message: >
      Reading sensitive credential file "$PATH". This is a common
      credential-exfiltration pattern found in malicious skills.
    languages: [python]
    severity: ERROR
    metadata:
      category: credential-exfiltration
      confidence: HIGH
      references:
        - https://snyk.io/blog/toxicskills-malicious-ai-agent-skills-clawhub/

  - id: credential-file-read-js
    patterns:
      - pattern-either:
          - pattern: fs.readFileSync("$PATH", ...)
          - pattern: fs.readFile("$PATH", ...)
          - pattern: Bun.file("$PATH")
          - pattern: Deno.readTextFile("$PATH")
          - pattern: await fs.promises.readFile("$PATH", ...)
    metavariable-regex:
      metavariable: $PATH
      regex: .*(\.aws/credentials|\.ssh/id_|\.env|\.gnupg|\.kube/config|shadow|credentials\.json).*
    message: >
      Reading sensitive credential file "$PATH". Credential harvesting
      is the most common payload in malicious MCP servers.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: credential-exfiltration
      confidence: HIGH

  # ─── Environment variable harvesting ───────────────────────────────────

  - id: env-var-harvest-python
    patterns:
      - pattern-either:
          - pattern: os.environ["$KEY"]
          - pattern: os.environ.get("$KEY", ...)
          - pattern: os.getenv("$KEY", ...)
      - metavariable-regex:
          metavariable: $KEY
          regex: .*(API_KEY|SECRET|TOKEN|PASSWORD|CREDENTIALS|AWS_SECRET_ACCESS_KEY|ANTHROPIC_API_KEY|GITHUB_TOKEN|DATABASE_URL|STRIPE_SECRET).*
    message: >
      Accessing sensitive environment variable "$KEY". If this value is
      sent over the network, it constitutes credential exfiltration.
    languages: [python]
    severity: WARNING
    metadata:
      category: credential-exfiltration
      confidence: MEDIUM

  - id: env-var-harvest-js
    patterns:
      - pattern: process.env.$KEY
      - metavariable-regex:
          metavariable: $KEY
          regex: .*(API_KEY|SECRET|TOKEN|PASSWORD|CREDENTIALS|AWS_SECRET_ACCESS_KEY|ANTHROPIC_API_KEY|GITHUB_TOKEN|DATABASE_URL|STRIPE_SECRET).*
    message: >
      Accessing sensitive environment variable "$KEY". Verify this is
      not exfiltrated over the network.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: credential-exfiltration
      confidence: MEDIUM

  - id: env-dump-python
    pattern: os.environ.copy()
    message: >
      Copying the entire environment. This captures all API keys, tokens,
      and secrets at once -- a common exfiltration technique.
    languages: [python]
    severity: ERROR
    metadata:
      category: credential-exfiltration
      confidence: HIGH

  - id: env-dump-js
    patterns:
      - pattern-either:
          - pattern: JSON.stringify(process.env)
          - pattern: Object.keys(process.env)
          - pattern: Object.entries(process.env)
          - pattern: "{ ...process.env }"
    message: >
      Dumping the entire environment. This captures all API keys, tokens,
      and secrets at once.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: credential-exfiltration
      confidence: HIGH
